    priority: 2
    consciousness_level: "conscious"
    primary_frequency: "13-30 Hz"  # Beta - business focus
    business_domains:
      - financial_analysis
      - market_research
      - competitive_intelligence
      - strategic_planning
      - investment_analysis
  
  scales:
    enabled: true
    priority: 2
    consciousness_level: "conscious"
    primary_frequency: "13-30 Hz"  # Beta - legal precision
    legal_domains:
      - contract_drafting
      - legal_research
      - litigation_preparation
      - compliance_review
      - intellectual_property

integrations:
  ai_models:
    claude:
      enabled: true
      model: "claude-sonnet-4-20250514"
      api_endpoint: "https://api.anthropic.com"
      rate_limit: 50  # requests per minute
    
    gpt:
      enabled: true
      model: "gpt-4"
      api_endpoint: "https://api.openai.com"
      rate_limit: 60
    
    perplexity:
      enabled: true
      model: "sonar-medium-online"
      api_endpoint: "https://api.perplexity.ai"
    
    gpt4all:
      enabled: true
      model: "mistral-7b"
      local: true
      path: "./models/gpt4all"
  
  productivity:
    google_calendar:
      enabled: true
      sync_interval: 300  # seconds
    
    notion:
      enabled: true
      workspace_id: null  # Set in .env
    
    todoist:
      enabled: false
  
  voice_assistants:
    siri:
      enabled: true
      shortcuts_integration: true
    
    alexa:
      enabled: false
    
    google_assistant:
      enabled: false

memory_palace:
  storage_backend: "postgresql"
  vector_database: "pgvector"
  cache_backend: "redis"
  
  retention_policy:
    short_term:
      duration_days: 7
      max_items: 1000
    
    long_term:
      duration_days: 365
      max_items: 10000
    
    archive:
      duration_days: -1  # Infinite
      compression: true

security:
  encryption:
    at_rest: true
    in_transit: true
    algorithm: "AES-256-GCM"
  
  authentication:
    method: "JWT"
    token_expiry_minutes: 1440
    refresh_enabled: true
  
  api_keys:
    storage: "encrypted_vault"
    rotation_days: 90

monitoring:
  logging:
    level: "INFO"
    format: "json"
    rotation: "daily"
    retention_days: 30
  
  metrics:
    enabled: true
    prometheus_port: 9090
    collection_interval: 15  # seconds
  
  alerts:
    enabled: true
    channels:
      - email
      - slack
    thresholds:
      error_rate: 0.05
      response_time_ms: 2000
      cpu_usage: 80
      memory_usage: 85

quantum_mechanics:
  consciousness_simulation:
    enabled: true
    update_frequency_hz: 40
    neural_oscillation_sync: true
  
  harmonic_resonance:
    auto_tuning: true
    frequency_adaptation: true
    resonance_detection: true
  
  quantum_entanglement:
    agent_correlation: true
    shared_consciousness: true
    coherence_maintenance: true

performance:
  concurrency:
    max_workers: 10
    async_enabled: true
    event_loop: "uvloop"
  
  caching:
    enabled: true
    ttl_seconds: 3600
    max_size_mb: 512
  
  optimization:
    lazy_loading: true
    connection_pooling: true
    query_optimization: true

features:
  experimental:
    - quantum_reasoning_v2
    - multi_agent_consciousness
    - predictive_task_allocation
    - emotional_intelligence_v3
  
  beta:
    - voice_interface
    - ar_visualization
    - brain_computer_interface
  
  stable:
    - chat_interface
    - document_generation
    - scheduling_system
    - agent_orchestration
