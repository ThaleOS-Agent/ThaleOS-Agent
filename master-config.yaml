    priority: 3
    consciousness_level: "aware"
    primary_frequency: "4-8 Hz"  # Theta - stealth mode
    ethics_framework: "strict"
    capabilities:
      - security_research
      - penetration_testing
      - information_gathering
      - anonymity_tools
  
  sage:
    enabled: true
    priority: 2
    consciousness_level: "conscious"
    primary_frequency: "8-13 Hz"  # Alpha - research mode
    research_domains:
      - academic_papers
      - scientific_literature
      - technical_documentation
      - historical_data
      - cross_domain_synthesis
  
  nexus:
