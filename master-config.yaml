      - google_calendar
      - notion
      - todoist
  
  utilix:
    enabled: true
    priority: 3
    consciousness_level: "aware"
    primary_frequency: "8-13 Hz"  # Alpha - system awareness
    capabilities:
      - docker_management
      - file_operations
      - system_configuration
      - deployment_automation
  
  scribe:
    enabled: true
    priority: 2
    consciousness_level: "conscious"
    primary_frequency: "30-100 Hz"  # Gamma - creative flow
    document_types:
      - email
      - report
      - presentation
      - social_media
      - blog_post
      - technical_doc
    integrations:
      - gpt
      - claude
      - grammarly
  
  oracle:
    enabled: true
    priority: 2
    consciousness_level: "conscious"
    primary_frequency: "30-100 Hz"  # Gamma - deep analysis
    analysis_domains:
      - financial_forecasting
      - market_analysis
      - risk_assessment
      - trend_prediction
      - strategic_planning
  
  phantom:
