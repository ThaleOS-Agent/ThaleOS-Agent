<!DOCTYPE html>
<html>
<head>
  <title>ThaleaOS Control Panel</title>
  <style>
    body { font-family: 'Courier New'; background: #111; color: #0f0; padding: 2em; }
    textarea { width: 100%; height: 200px; }
    button { margin-top: 1em; padding: 10px; background: #222; color: #0f0; border: 1px solid #0f0; }
  </style>
</head>
<body>
  <h1>🧿 ThaleaOS Agentic Control Panel</h1>
  <p>NIL-09 Online | Analyzer Core Linked</p>
  <textarea id="inputArea" placeholder="Paste messages here..."></textarea>
  <button onclick="analyze()">Analyze with Core</button>
  <pre id="resultArea"></pre>

  <script>
    async function analyze() {
      const text = document.getElementById('inputArea').value.split('\n').filter(Boolean);
      const res = await fetch('http://localhost:5005/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: text })
      });
      const data = await res.json();
      document.getElementById('resultArea').textContent = JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
