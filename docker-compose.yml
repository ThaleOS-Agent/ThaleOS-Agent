version: '3.8'

services:
  # Backend - FastAPI with Python
  quantum-brain:
    build:
      context: ./quantum-brain
      dockerfile: Dockerfile
    container_name: thaleos-quantum-brain
    ports:
      - "8099:8099"
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=production
      - LOG_LEVEL=info
    volumes:
      - ./memory-palace:/app/memory-palace
      - ./system-diary/logs:/app/logs
      - ./quantum-security:/app/security
    networks:
      - thaleos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8099/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend - React/Vite
  consciousness-interface:
    build:
      context: ./consciousness-interface
      dockerfile: Dockerfile
    container_name: thaleos-consciousness-interface
    ports:
      - "1420:80"
    depends_on:
      - quantum-brain
    networks:
      - thaleos-network
    restart: unless-stopped

  # Redis for caching and real-time data
  redis:
    image: redis:7-alpine
    container_name: thaleos-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - thaleos-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # PostgreSQL for structured data storage
  postgres:
    image: postgres:16-alpine
    container_name: thaleos-postgres
    environment:
      - POSTGRES_DB=thaleos
      - POSTGRES_USER=thaleos
      - POSTGRES_PASSWORD=${DB_PASSWORD:-quantumpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - thaleos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thaleos"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: thaleos-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./deployment/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - quantum-brain
      - consciousness-interface
    networks:
      - thaleos-network
    restart: unless-stopped

networks:
  thaleos-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
