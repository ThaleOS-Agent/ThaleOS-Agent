name: Deploy ThaleOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # Build the React frontend
  # ─────────────────────────────────────────
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: consciousness-interface/package-lock.json

      - name: Install dependencies
        working-directory: consciousness-interface
        run: npm ci

      - name: Build
        working-directory: consciousness-interface
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:8099' }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL || 'ws://localhost:8099' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: consciousness-interface/dist
          retention-days: 1

  # ─────────────────────────────────────────
  # Build for GitHub Pages (different base path)
  # ─────────────────────────────────────────
  build-github-pages:
    name: Build for GitHub Pages
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: consciousness-interface/package-lock.json

      - name: Install dependencies
        working-directory: consciousness-interface
        run: npm ci

      - name: Build for GitHub Pages
        working-directory: consciousness-interface
        run: npm run build
        env:
          GITHUB_PAGES: 'true'
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:8099' }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL || 'ws://localhost:8099' }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: consciousness-interface/dist

  # ─────────────────────────────────────────
  # Deploy to GitHub Pages
  # ─────────────────────────────────────────
  deploy-github-pages:
    name: Deploy → GitHub Pages
    needs: build-github-pages
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─────────────────────────────────────────
  # Deploy to Cloudflare Pages
  # ─────────────────────────────────────────
  deploy-cloudflare:
    name: Deploy → Cloudflare Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy dist --project-name=thaleos-agent --commit-dirty=true
